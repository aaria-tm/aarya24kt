<!DOCTYPE html>
<html lang="en">
<head>
  <title>Your Cart</title>
  <link rel="stylesheet" href="styles.css">
  <script src="cart.js" defer></script>
</head>

<body>

<!-- Navigation Bar -->
<nav class="navbar">
  <ul class="nav-list">
    <li><a href="index.html">Home</a></li>
    <li><a href="men.html">Men</a></li>
    <li><a href="women.html">Women</a></li>
    <li><a href="offers.html">Special Offers</a></li>
    <li><a href="about.html">About Us</a></li>
    <li><a href="query.html">Query</a></li>
    <li><a href="cart.html">Cart 🛒</a></li>
  </ul>
</nav>

<header><h1>Your Cart</h1></header>

<div id="cart-container"></div>

<!-- CLEAR ALL BUTTON -->
<div style="text-align:center; margin: 20px;">
  <button onclick="clearAll()" style="padding:10px 20px; background:red; color:white; border:none; cursor:pointer; border-radius:5px;">
    Clear All
  </button>
</div>

<script>
  let cartData = JSON.parse(localStorage.getItem("cart")) || [];
  const container = document.getElementById("cart-container");

  if (cartData.length === 0) {
    container.innerHTML = "<h2 style='text-align:center;margin-top:20px;'>Your cart is empty</h2>";
  } else {
    cartData.forEach((item, i) => {
      container.innerHTML += `
        <div class="cart-item">
          <img src="${item.img}">
          
          <div>
            <h3>${item.name}</h3>
            <p>Price: ₹${item.price}</p>

            <div class="quantity-controls">
              <button onclick="decrease(${i})">-</button>
              <span>${item.qty}</span>
              <button onclick="increase(${i})">+</button>
            </div>

            <!-- CLEAR ONE ITEM BUTTON -->
            <button onclick="clearItem(${i})" 
              style="margin-top:10px; padding:5px 10px; background:#444; color:white; border:none; cursor:pointer; border-radius:4px;">
              Clear Item
            </button>
          </div>

          <h3>₹${item.qty * item.price}</h3>
        </div>
      `;
    });
  }
</script>

<footer>
  <p>© 2025 Aarya 24kt. All Rights Reserved.</p>
</footer>

</body>
</html>
